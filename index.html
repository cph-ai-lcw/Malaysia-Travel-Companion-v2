<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">
  <meta name="description" content="2026 國能馬來西亞員工旅遊 PWA 手帳">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Malaysia Trip">
  <title>Malaysia Travel Companion</title>

  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon-192.png">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./css/app.css">
</head>
<body>
  <div id="app-shell">
    <header class="topbar">
      <button class="icon-button" id="menuButton" aria-label="開啟更多選單">☰</button>
      <div class="brand">
        <strong id="brandTitle">馬來西亞旅遊手帳</strong>
        <span id="brandSubtitle">2026 國能員工旅遊</span>
      </div>
      <div class="topbar-actions">
        <button class="pill-button" id="languageButton" aria-label="切換語言">中</button>
        <button class="icon-button" id="themeButton" aria-label="切換主題">◐</button>
      </div>
    </header>

    <main id="app" tabindex="-1"></main>

    <nav class="bottom-nav" aria-label="主要導覽">
      <a href="#/home" data-route="home"><span>⌂</span><small data-i18n="home">首頁</small></a>
      <a href="#/itinerary" data-route="itinerary"><span>▤</span><small data-i18n="itinerary">行程</small></a>
      <a href="#/guide" data-route="guide"><span>✦</span><small data-i18n="guide">攻略</small></a>
      <a href="#/tools" data-route="tools"><span>⌘</span><small data-i18n="tools">工具</small></a>
      <a href="#/profile" data-route="profile"><span>◎</span><small data-i18n="profile">我的</small></a>
      <a href="#/more" data-route="more"><span>•••</span><small data-i18n="more">更多</small></a>
    </nav>

    <div class="sheet-backdrop" id="sheetBackdrop" hidden></div>
    <aside class="side-sheet" id="sideSheet" aria-hidden="true">
      <div class="sheet-handle"></div>
      <button class="sheet-link" data-go="settings">⚙ <span data-i18n="settings">設定</span></button>
      <button class="sheet-link" data-go="leader">🧭 <span data-i18n="leader">領隊專區</span></button>
      <button class="sheet-link" data-go="emergency">☎ <span data-i18n="emergency">緊急聯絡</span></button>
      <button class="sheet-link" id="installButton" hidden>＋ <span>安裝 App</span></button>
      <p class="sheet-version" id="sheetVersion"></p>
    </aside>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
