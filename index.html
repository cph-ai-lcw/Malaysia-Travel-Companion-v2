<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">
  <meta name="description" content="2026 國能馬來西亞員工旅遊 PWA 手帳">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Malaysia Trip">

  <title>Malaysia Travel Companion</title>

  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon-192.png">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">

  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/dashboard.css">
  <link rel="stylesheet" href="./css/navigation.css">
  <link rel="stylesheet" href="./css/theme.css">
  <link rel="stylesheet" href="./css/animation.css">
  <link rel="stylesheet" href="./css/responsive.css">
  <link rel="stylesheet" href="./css/milestone2.css">
</head>

<body>
  <div id="appShell">
    <header class="topbar">
      <button id="menuButton" class="icon-button" type="button" aria-label="開啟更多選單">☰</button>

      <div class="brand">
        <strong id="brandTitle">馬來西亞旅遊手帳</strong>
        <span id="brandSubtitle">2026 國能員工旅遊</span>
      </div>

      <div class="topbar-actions">
        <button id="languageButton" class="pill-button" type="button" aria-label="切換語言">中</button>
        <button id="themeButton" class="icon-button" type="button" aria-label="切換主題">◐</button>
      </div>
    </header>

    <main id="app" tabindex="-1"></main>

    <nav id="bottomNavigation" class="bottom-nav" aria-label="主要導覽">
      <a href="#/home" data-route="home">
        <span class="nav-icon">⌂</span>
        <small data-i18n="home">首頁</small>
      </a>
      <a href="#/itinerary" data-route="itinerary">
        <span class="nav-icon">▤</span>
        <small data-i18n="itinerary">行程</small>
      </a>
      <a href="#/guide" data-route="guide">
        <span class="nav-icon">✦</span>
        <small data-i18n="guide">攻略</small>
      </a>
      <a href="#/tools" data-route="tools">
        <span class="nav-icon">⌘</span>
        <small data-i18n="tools">工具</small>
      </a>
      <a href="#/profile" data-route="profile">
        <span class="nav-icon">◎</span>
        <small data-i18n="profile">我的</small>
      </a>
      <a href="#/more" data-route="more">
        <span class="nav-icon">•••</span>
        <small data-i18n="more">更多</small>
      </a>
    </nav>

    <div id="sheetBackdrop" class="sheet-backdrop" hidden></div>

    <aside id="sideSheet" class="side-sheet" aria-hidden="true">
      <div class="sheet-handle"></div>

      <button class="sheet-link" data-go="settings" type="button">
        <span>⚙</span><span data-i18n="settings">設定</span>
      </button>

      <button class="sheet-link" data-go="leader" type="button">
        <span>🧭</span><span data-i18n="leader">領隊專區</span>
      </button>

      <button class="sheet-link" data-go="emergency" type="button">
        <span>☎</span><span data-i18n="emergency">緊急聯絡</span>
      </button>

      <button id="installButton" class="sheet-link" type="button" hidden>
        <span>＋</span><span data-i18n="installApp">安裝 App</span>
      </button>

      <p id="sheetVersion" class="sheet-version"></p>
    </aside>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
