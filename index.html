<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">
  <meta name="description" content="2026 國能馬來西亞員工旅遊手帳">
  <title>Malaysia Travel Companion</title>

  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./css/app.css">
</head>
<body>
  <div id="app-shell">
    <header class="topbar">
      <button id="menuButton" class="icon-button" type="button" aria-label="更多選單">☰</button>

      <div class="brand">
        <strong id="brandTitle">馬來西亞旅遊手帳</strong>
        <span id="brandSubtitle">2026 國能員工旅遊</span>
      </div>

      <div class="topbar-actions">
        <button id="languageButton" class="pill-button" type="button">中</button>
        <button id="themeButton" class="icon-button" type="button" aria-label="切換主題">◐</button>
      </div>
    </header>

    <main id="app" tabindex="-1"></main>

    <nav class="bottom-nav" aria-label="主要導覽">
      <a href="#/home" data-route="home"><span>⌂</span><small data-i18n="home">首頁</small></a>
      <a href="#/itinerary" data-route="itinerary"><span>▤</span><small data-i18n="itinerary">行程</small></a>
      <a href="#/guide" data-route="guide"><span>✦</span><small data-i18n="guide">攻略</small></a>
      <a href="#/tools" data-route="tools"><span>⌘</span><small data-i18n="tools">工具</small></a>
      <a href="#/profile" data-route="profile"><span>◎</span><small data-i18n="profile">我的</small></a>
      <a href="#/more" data-route="more"><span>•••</span><small data-i18n="more">更多</small></a>
    </nav>

    <div id="sheetBackdrop" class="sheet-backdrop" hidden></div>

    <aside id="sideSheet" class="side-sheet" aria-hidden="true">
      <div class="sheet-handle"></div>
      <button class="sheet-link" data-go="settings">⚙ <span data-i18n="settings">設定</span></button>
      <button class="sheet-link" data-go="leader">🧭 <span data-i18n="leader">領隊專區</span></button>
      <button class="sheet-link" data-go="emergency">☎ <span data-i18n="emergency">緊急聯絡</span></button>
      <p id="sheetVersion" class="sheet-version"></p>
    </aside>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
